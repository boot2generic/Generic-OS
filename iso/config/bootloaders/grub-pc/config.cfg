set default=0

if [ x$feature_default_font_path = xy ] ; then
    font=unicode
else
    font=$prefix/unicode.pf2
fi

# Copied from the netinst image
if loadfont $font ; then
    set gfxmode=800x600
    set gfxpayload=keep
    insmod efi_gop
    insmod efi_uga
    insmod video_bochs
    insmod video_cirrus
else
    set gfxmode=auto
    insmod all_video
fi

insmod gfxterm
insmod png

source /boot/grub/theme.cfg

terminal_output gfxterm

insmod play
play 960 440 1 0 4 440 1

# Generic-OS override (per-file overlay from config/bootloaders/grub-pc/):
# auto-boot the default live entry after 5s instead of waiting forever, so
# headless/VM UEFI boots (incl. validate-boot.py --firmware uefi) proceed.
set timeout=5
