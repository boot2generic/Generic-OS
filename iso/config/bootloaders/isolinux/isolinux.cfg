# Override of live-build's isolinux.cfg (per-file overlay from
# config/bootloaders/isolinux/). Only change: timeout 0 → 50 (5s, units are
# 1/10s) so the default live entry auto-boots — headless/VM boots (incl. the
# validate-boot.py --firmware mode) no longer wait forever for a keypress.
include menu.cfg
default vesamenu.c32
prompt 0
timeout 50
