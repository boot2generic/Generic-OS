name: Build Generic-OS ISOs

# Builds every edition (matrix from iso/config.env) in parallel and publishes
# the ISOs. Triggers on a version tag (the "release" flow) and on manual
# dispatch. Each run builds several multi-GB ISOs (~1-3h each, cold), so it is
# intentionally NOT wired to every commit — to do that, add:
#     branches: [ main ]
# under `on.push` below.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch: {}

permissions:
  contents: write          # create the GitHub Release on tags

concurrency:
  group: build-iso-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Read EDITIONS from iso/config.env so it stays the single source of truth.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      editions: ${{ steps.m.outputs.editions }}
    steps:
      - uses: actions/checkout@v4
      - id: m
        run: |
          . iso/config.env
          echo "editions=$(printf '%s\n' $EDITIONS | jq -R . | jq -cs .)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 330               # under the 6h hosted-runner cap
    strategy:
      fail-fast: false                 # one edition failing shouldn't kill the rest
      matrix:
        edition: ${{ fromJson(needs.prepare.outputs.editions) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive        # pull the dotfiles submodule

      - name: Free disk space
        run: |
          # Hosted runners only have ~14G free on /; reclaim ~30G for the chroot+ISOs.
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
          sudo docker image prune -af 2>/dev/null || true
          df -h /

      - name: Build ${{ matrix.edition }}
        env:
          NO_UPDATE_DOTFILES: "1"      # build the pinned submodule commit (reproducible release)
        run: |
          cd iso
          sudo -E ./container-build.sh "${{ matrix.edition }}"

      - name: Checksums
        run: |
          cd iso/out
          sha256sum *.iso | tee "SHA256SUMS-${{ matrix.edition }}.txt"
          ls -lh

      - name: Upload ISOs (workflow artifacts — reliable for any size)
        uses: actions/upload-artifact@v4
        with:
          name: generic-os-${{ matrix.edition }}
          path: |
            iso/out/*.iso
            iso/out/SHA256SUMS-*.txt
          if-no-files-found: error
          compression-level: 0         # ISOs are already compressed
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.edition }}
          path: iso/build.log
          if-no-files-found: ignore

  # On a tag, attach the ISOs + checksums to a GitHub Release. GitHub caps each
  # release asset at 2 GiB (but allows many assets, unlimited total size + free
  # downloads), so ISOs >2 GiB are split into <2 GiB parts; users reassemble
  # them with `cat` (instructions go in the release notes). Fully free, no
  # external host. SHA256SUMS.txt verifies the *reassembled* ISO.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Split oversized ISOs (>1.9 GiB) into parts
        run: |
          cd dist
          cat SHA256SUMS-*.txt > SHA256SUMS.txt 2>/dev/null || true
          limit=$((1900*1024*1024))                   # keep parts safely under GitHub's 2 GiB cap
          for iso in *.iso; do
            [ -f "$iso" ] || continue
            if [ "$(stat -c%s "$iso")" -ge "$limit" ]; then
              echo "splitting $iso ($(du -h "$iso" | cut -f1)) into 1900M parts"
              split -b 1900M -d --suffix-length=2 "$iso" "$iso.part"
              rm -f "$iso"                             # upload parts instead of the whole file
            fi
          done
          ls -lh
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          {
            printf 'Generic-OS ISOs (built by CI).\n\n'
            printf 'Verify: `sha256sum -c SHA256SUMS.txt`\n\n'
            printf 'ISOs over 2 GiB are uploaded as split parts (NAME.iso.part00, .part01, ...).\n'
            printf 'Reassemble before use:\n\n'
            printf '    cat NAME.iso.part* > NAME.iso\n'
            printf '    sha256sum -c SHA256SUMS.txt\n\n'
            printf 'Smaller ISOs are attached whole.\n'
          } > notes.md
          gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$REPO" --title "Generic-OS $TAG" --notes-file notes.md
          shopt -s nullglob
          for f in dist/SHA256SUMS.txt dist/*.iso dist/*.iso.part*; do
            echo "uploading $(basename "$f") ($(du -h "$f" | cut -f1))"
            gh release upload "$TAG" "$f" --repo "$REPO" --clobber \
              || echo "::warning::failed to attach $f"
          done
